<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-subtitle">Notes & guides from my tech journey</p>
        <p class="site-disclaimer">Opinions are my own and do not represent the views of my employer.</p>
        {% if page.url != '/' and page.url != '/index.html' %}
          <a class="nav-link" href="{{ '/' | relative_url }}">← Home</a>
        {% endif %}
      </header>
      {{ content }}
    </div>
  </body>
  <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true">
    <img id="lightbox-img" src="" alt="">
  </div>
  <script>
    (function () {
      var sidebar = document.getElementById('article-sidebar');
      if (!sidebar) return;
      var article = document.querySelector('article.card');
      if (!article) return;

      var headings = article.querySelectorAll('h1, h2');
      var items = [];
      headings.forEach(function (h) {
        if (h.id) items.push({ tag: h.tagName, id: h.id, text: h.textContent });
      });
      if (items.length < 3) { sidebar.style.display = 'none'; return; }

      var ul = document.createElement('ul');
      items.forEach(function (item) {
        var li = document.createElement('li');
        li.className = item.tag.toLowerCase();
        var a = document.createElement('a');
        a.href = '#' + item.id;
        a.textContent = item.text;
        li.appendChild(a);
        ul.appendChild(li);
      });
      sidebar.appendChild(ul);

      var links = sidebar.querySelectorAll('a');
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            links.forEach(function (a) { a.classList.remove('active'); });
            var active = sidebar.querySelector('a[href="#' + entry.target.id + '"]');
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '0px 0px -70% 0px' });

      items.forEach(function (item) {
        var el = document.getElementById(item.id);
        if (el) observer.observe(el);
      });
    })();

    (function () {
      var overlay = document.getElementById('lightbox');
      var lbImg = document.getElementById('lightbox-img');

      document.querySelectorAll('article img').forEach(function (img) {
        img.addEventListener('click', function () {
          lbImg.src = img.src;
          lbImg.alt = img.alt;
          overlay.classList.add('open');
        });
      });

      overlay.addEventListener('click', function (e) {
        if (e.target !== lbImg) overlay.classList.remove('open');
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') overlay.classList.remove('open');
      });
    })();
  </script>
</html>
